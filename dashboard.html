<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Solar Monitor</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 { color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
        .device-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-icon { font-size: 48px; margin-bottom: 15px; }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .metric-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .metric-unit { font-size: 18px; color: #666; }
        .status-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .last-update { font-family: monospace; color: #f39c12; font-weight: bold; }
        .loading { text-align: center; padding: 50px; background: white; border-radius: 20px; }
        .error { text-align: center; padding: 50px; background: white; border-radius: 20px; color: red; }
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            margin-top: 30px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>☀️ ESP32 Solar Thermal Monitor</h1>
        <div class="device-badge" id="deviceBadge">Loading...</div>
        <button onclick="logout()">🔒 Logout</button>
    </div>

    <div id="content">
        <div class="loading">Loading data...</div>
    </div>
</div>

<script>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOL9E1RWbZ4_8sng38seRTiVuVrokTuXbGXq42uCtWWPcaC5mXVYUkC2Y5Caxo0KRe6g/exec";

function handleData(data) {
    console.log("🔥 DATA RECEIVED:", data);
    document.body.innerHTML = "<h1>WORKS</h1>";
}

function loadData() {
    console.log("🚀 Loading script...");

    const script = document.createElement("script");
    script.id = "jsonpScript";

    script.onload = () => console.log("✅ Script loaded");
    script.onerror = (e) => console.error("❌ Script failed", e);

    script.src = SCRIPT_URL + "?callback=handleData&t=" + Date.now();

    document.body.appendChild(script);
}

loadData();
</script>
</script>

</body>
</html>
