
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Solar Monitor - Live Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 { color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
        .device-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-icon { font-size: 48px; margin-bottom: 15px; }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .metric-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .metric-unit { font-size: 18px; color: #666; }
        .status-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .last-update { font-family: monospace; color: #f39c12; font-weight: bold; }
        .loading { text-align: center; padding: 50px; background: white; border-radius: 20px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>☀️</span> ESP32 Solar Thermal Monitor</h1>
            <div class="device-badge" id="deviceBadge">Loading...</div>
            <button onclick="logout()">🔒 Logout</button>
        </div>
        <div id="content"><div class="loading"><div class="spinner"></div><p>Loading data from ThingSpeak...</p></div></div>
    </div>
    <script>
        // ===== THINGSPEAK CONFIGURATION =====
        // Replace with your ThingSpeak Channel ID and Read API Key
        const CHANNEL_ID = 3347431;  // ← CHANGE THIS to your ThingSpeak Channel ID
        const READ_API_KEY = "U2NLJMI9M2ORH9FM";  // ← CHANGE THIS to your Read API Key
        
        let deviceId = localStorage.getItem('selectedDeviceId');
        let updateInterval;
        
        if (!deviceId) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('deviceBadge').innerHTML = 📡 ${deviceId};
        
        async function fetchData() {
            // Get the last 1 entry from ThingSpeak
            const url = https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_API_KEY};
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    document.getElementById('content').innerHTML = <div class="loading"><h3>Waiting for data from ${deviceId}</h3><p>ESP32 is online. First upload in progress...</p><button onclick="location.reload()">Refresh</button></div>;
                    return;
                }
                
                const data = await response.json();
                
                // ThingSpeak fields mapping:
                // field1 = Temperature In (T1)
                // field2 = Temperature Out (T2)  
                // field3 = Thermal Power (Q)
                // field4 = Energy
                // field5 = Efficiency
                // field6 = Solar Power
                
                const Tin = parseFloat(data.field1) || 0;
                const Tout = parseFloat(data.field2) || 0;
                const deltaT = Tout - Tin;
                const Q = parseFloat(data.field3) || 0;
                const energy = parseFloat(data.field4) || 0;
                const efficiency = parseFloat(data.field5) || 0;
                const solarPower = parseFloat(data.field6) || 0;
                
                document.getElementById('content').innerHTML = `
                    <div class="status-card">
                        <div>✅ Device: ${deviceId} - Data from ThingSpeak</div>
                        <div class="last-update">🕒 Last update: ${new Date(data.created_at).toLocaleString()}</div>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-icon">🌡️</div><div class="metric-label">INLET TEMP (T1)</div><div class="metric-value">${Tin.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                        <div class="metric-card"><div class="metric-icon">🌡️</div><div class="metric-label">OUTLET TEMP (T2)</div><div class="metric-value">${Tout.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                        <div class="metric-card"><div class="metric-icon">📊</div><div class="metric-label">DELTA T (ΔT)</div><div class="metric-value">${deltaT.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                        <div class="metric-card"><div class="metric-icon">⚡</div><div class="metric-label">THERMAL POWER (Q)</div><div class="metric-value">${Q.toFixed(1)}<span class="metric-unit">W</span></div></div>
                        <div class="metric-card"><div class="metric-icon">🔋</div><div class="metric-label">ENERGY</div><div class="metric-value">${energy.toFixed(1)}<span class="metric-unit">J</span></div></div>
                        <div class="metric-card"><div class="metric-icon">🎯</div><div class="metric-label">EFFICIENCY</div><div class="metric-value">${efficiency.toFixed(1)}<span class="metric-unit">%</span></div></div>
                        <div class="metric-card"><div class="metric-icon">☀️</div><div class="metric-label">SOLAR POWER</div><div class="metric-value">${solarPower.toFixed(1)}<span class="metric-unit">W</span></div></div>
                    </div>
                `;
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('content').innerHTML = <div class="loading"><h3>Connection Error</h3><button onclick="fetchData()">Retry</button></div>;
            }
        }
        
        function logout() {
            if (updateInterval) clearInterval(updateInterval);
            localStorage.removeItem('selectedDeviceId');
            window.location.href = 'index.html';
        }
        
        fetchData();
        updateInterval = setInterval(fetchData, 15000); // Refresh every 15 seconds
    </script>
</body>
</html>
