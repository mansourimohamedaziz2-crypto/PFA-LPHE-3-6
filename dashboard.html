<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Solar Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { color: #1a1a2e; display: flex; align-items: center; gap: 10px; font-size: 1.5rem; }
        .device-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .metric-value {
            font-size: 42px;
            font-weight: bold;
            color: #e67e22;
            margin: 10px 0;
        }
        .loading, .error { 
            text-align: center; 
            padding: 50px; 
            background: white; 
            border-radius: 20px; 
            font-weight: bold;
        }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>☀️ ESP32 Solar Monitor</h1>
        <div class="device-badge" id="status-text">Connecting...</div>
    </div>

    <div id="content">
        <div class="loading" id="loader">Fetching data...</div>
        <div class="metrics-grid" id="metrics-container" style="display: none;"></div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOL9E1RWbZ4_8sng38seRTiVuVrokTuXbGXq42uCtWWPcaC5mXVYUkC2Y5Caxo0KRe6g/exec";

async function loadData() {
    const loader = document.getElementById('loader');
    const container = document.getElementById('metrics-container');
    const statusText = document.getElementById('status-text');

    try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error();
        
        const data = await response.json();

        loader.style.display = 'none';
        container.style.display = 'grid';
        statusText.innerText = "Online";
        
        container.innerHTML = `
            <div class="metric-card">
                <div class="metric-label">Temperature</div>
                <div class="metric-value">${data.temp || '--'}</div>
                <div class="metric-label">Celsius</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Voltage</div>
                <div class="metric-value">${data.volt || '--'}</div>
                <div class="metric-label">Volts</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Status</div>
                <div class="metric-value" style="font-size: 24px;">${data.status || 'Active'}</div>
            </div>
        `;
    } catch (error) {
        loader.innerHTML = <div class="error">Connection Error</div>;
        statusText.innerText = "Offline";
    }
}

loadData();
setInterval(loadData, 30000);

function logout() {
    window.location.reload();
}
</script>

</body>
</html>
