<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ESP32 Energy Monitor - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('PFAlphe.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0a0e27;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 0;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 420px;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .energy-icon {
            font-size: 70px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        h2 {
            font-size: 32px;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 35px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s;
            box-sizing: border-box;
            font-family: monospace;
        }
        
        input:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.1);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(243, 156, 18, 0.4);
        }
        
        .error {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 13px;
            padding: 12px;
            background: #fde8e8;
            border-radius: 10px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            display: none;
            width: 25px;
            height: 25px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f39c12;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 15px auto 0;
        }
        
        .loading.show {
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-text {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="energy-icon">⚡</div>
        <h2>ESP32 Energy Monitor</h2>
        <div class="subtitle">Real-time Performance Tracking</div>
        
        <div class="input-group">
            <label>🔑 Device ID</label>
            <input type="text" id="deviceId" placeholder="Enter Device ID" autocomplete="off">
        </div>
        
        <button onclick="accessDevice()">
            ⚡ Access Dashboard →
        </button>
        
        <div id="errorMsg" class="error"></div>
        <div id="loadingSpinner" class="loading"></div>
        
        <div class="info-text">
            💡 Monitoring: Temperature | Flow Rate (Q) | Energy | Efficiency
        </div>
    </div>

    <script>
        function accessDevice() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const spinner = document.getElementById('loadingSpinner');
            const button = document.querySelector('button');
            
            errorDiv.classList.remove('show');
            
            if (!deviceId) {
                errorDiv.textContent = '⚠️ Please enter a Device ID';
                errorDiv.classList.add('show');
                return;
            }
            
            spinner.classList.add('show');
            button.disabled = true;
            button.style.opacity = '0.7';
            
            localStorage.setItem('selectedDeviceId', deviceId);
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        }
        
        document.getElementById('deviceId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                accessDevice();
            }
        });
        
        window.addEventListener('load', function() {
            document.getElementById('deviceId').focus();
        });
    </script>
</body>
</html>
