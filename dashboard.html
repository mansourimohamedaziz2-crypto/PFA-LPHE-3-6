<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Energy Monitor - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 { color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
        .device-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-icon { font-size: 48px; margin-bottom: 15px; }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .metric-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .metric-unit { font-size: 18px; color: #666; }
        .status-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .last-update { font-family: monospace; color: #f39c12; font-weight: bold; }
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .loading { text-align: center; padding: 50px; background: white; border-radius: 20px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .metric-value { font-size: 32px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>☀️</span> Solar Thermal Monitor</h1>
            <div class="device-badge" id="deviceBadge">Loading...</div>
            <button onclick="logout()">🔒 Logout</button>
        </div>
        <div id="content"><div class="loading"><div class="spinner"></div><p>Connecting to device...</p></div></div>
    </div>
    <script>
        let deviceId = localStorage.getItem('selectedDeviceId');
        let updateInterval;
        let historyData = [];
        
        if (!deviceId) { window.location.href = 'index.html'; }
        
        document.getElementById('deviceBadge').innerHTML = 📡 ${deviceId};
        
        async function fetchDeviceData() {
            const url = https://raw.githubusercontent.com/mansourimohamedaziz2-crypto/PFA-LPHE-3-6/main/data_${deviceId}.json;
            console.log("Fetching:", url);
            
            try {
                const response = await fetch(url);
                console.log("Response status:", response.status);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        document.getElementById('content').innerHTML = <div class="loading"><div style="font-size:64px;">⏳</div><h3>Waiting for Data</h3><p>ESP32 is online but hasn't uploaded yet.</p><p>Device ID: ${deviceId}</p><p>Wait 30-60 seconds, then refresh.</p><button onclick="location.reload()" style="margin-top:20px;">🔄 Refresh</button></div>;
                    } else {
                        document.getElementById('content').innerHTML = <div class="loading"><div style="font-size:64px;">❌</div><h3>Error ${response.status}</h3><button onclick="fetchDeviceData()" style="margin-top:20px;">Retry</button></div>;
                    }
                    return;
                }
                
                const data = await response.json();
                console.log("Data received:", data);
                showDashboard(data);
                
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('content').innerHTML = <div class="loading"><div style="font-size:64px;">⚠️</div><h3>Network Error</h3><button onclick="fetchDeviceData()" style="margin-top:20px;">Retry</button></div>;
            }
        }
        
        function showDashboard(data) {
            const Tin = data.temperature_in || data.Tin || 0;
            const Tout = data.temperature_out || data.Tout || 0;
            const deltaT = Tout - Tin;
            const thermalPower = data.Q || data.thermalPower_W || 0;
            const energyVal = data.energy || 0;
            const efficiency = data.efficiency || 0;
            const solarPower = data.solar_power || 0;
            
            if (data.timestamp) {
                historyData.unshift({
                    timestamp: data.timestamp,
                    Tin: Tin,
                    Tout: Tout,
                    Q: thermalPower,
                    energy: energyVal,
                    efficiency: efficiency
                });
                if (historyData.length > 20) historyData.pop();
            }
            
            document.getElementById('content').innerHTML = `
                <div class="status-card">
                    <div>✅ System Online - Device: ${deviceId}</div>
                    <div class="last-update">🕒 Last update: ${new Date(parseInt(data.timestamp)).toLocaleString()}</div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-card"><div class="metric-icon">🌡️</div><div class="metric-label">INLET TEMP (T1)</div><div class="metric-value">${Tin.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                    <div class="metric-card"><div class="metric-icon">🌡️</div><div class="metric-label">OUTLET TEMP (T2)</div><div class="metric-value">${Tout.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                    <div class="metric-card"><div class="metric-icon">📊</div><div class="metric-label">DELTA T (ΔT)</div><div class="metric-value">${deltaT.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                    <div class="metric-card"><div class="metric-icon">⚡</div><div class="metric-label">THERMAL POWER (Q)</div><div class="metric-value">${thermalPower.toFixed(1)}<span class="metric-unit">W</span></div></div>
                    <div class="metric-card"><div class="metric-icon">🔋</div><div class="metric-label">ENERGY</div><div class="metric-value">${energyVal.toFixed(1)}<span class="metric-unit">J</span></div></div>
                    <div class="metric-card"><div class="metric-icon">🎯</div><div class="metric-label">EFFICIENCY</div><div class="metric-value">${efficiency.toFixed(1)}<span class="metric-unit">%</span></div></div>
                    <div class="metric-card"><div class="metric-icon">☀️</div><div class="metric-label">SOLAR POWER</div><div class="metric-value">${solarPower.toFixed(1)}<span class="metric-unit">W</span></div></div>
                </div>
                <div class="table-container">
                    <h3>📜 Historical Data</h3>
                    <table><thead><tr><th>Time</th><th>T1 (°C)</th><th>T2 (°C)</th><th>Q (W)</th><th>Energy (J)</th><th>Eff (%)</th></tr></thead>
                    <tbody>${historyData.map(entry => <tr><td>${new Date(parseInt(entry.timestamp)).toLocaleTimeString()}</td><td>${entry.Tin.toFixed(1)}</td><td>${entry.Tout.toFixed(1)}</td><td>${entry.Q.toFixed(1)}</td><td>${entry.energy.toFixed(1)}</td><td>${entry.efficiency.toFixed(1)}</td></tr>).join('')}</tbody></table>
                </div>
            `;
        }
        
        function logout() { if (updateInterval) clearInterval(updateInterval); localStorage.removeItem('selectedDeviceId'); window.location.href = 'index.html'; }
        
        fetchDeviceData();
        updateInterval = setInterval(fetchDeviceData, 10000);
    </script>
</body>
</html>
