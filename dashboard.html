<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Solar Monitor</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 { color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
        .device-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-icon { font-size: 48px; margin-bottom: 15px; }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .metric-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .metric-unit { font-size: 18px; color: #666; }
        .status-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .last-update { font-family: monospace; color: #f39c12; font-weight: bold; }
        .loading { text-align: center; padding: 50px; background: white; border-radius: 20px; }
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            margin-top: 30px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <h1>☀️ ESP32 Solar Thermal Monitor</h1>
        <div class="device-badge" id="deviceBadge">Loading...</div>
        <button onclick="logout()">🔒 Logout</button>
    </div>

    <div id="content">
        <div class="loading">Loading data from Google Sheets...</div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZ0PyfG73cPwqc3H8RVpKFC3Sgy6zc689Y7O7uZFtawIS8LJcqtpqg5sbxt7XmU0e8rQ/exec";

let deviceId = localStorage.getItem('selectedDeviceId');
let updateInterval;

if (!deviceId) {
    window.location.href = 'index.html';
}

document.getElementById('deviceBadge').innerHTML = `📡 ${deviceId}`;

function handleData(data) {
    console.log("DATA RECEIVED:", data);

    if (!data || data.length === 0) {
        document.getElementById('content').innerHTML =
            '<div class="loading">No data available in the sheet</div>';
        return;
    }

    const latest = data[data.length - 1];
    const last20 = data.slice(-20).reverse();

    // Latest values for the top cards - safely parsing strings to numbers
    const Tin = parseFloat(latest.Temperature_In || 0);
    const Tout = parseFloat(latest.Temperature_Out || 0);
    const deltaT = (Tout - Tin).toFixed(1);
    const Q = parseFloat(latest.Thermal_Power_W || 0);
    const energy = parseFloat(latest.Thermal_Energy_J || 0);
    const efficiency = parseFloat(latest.Energy_Efficiency_Pct || latest.Power_Efficiency_Pct || 0);
    const solarPower = parseFloat(latest.Solar_Power_W || 0);

    document.getElementById('content').innerHTML = `
        <div class="status-card">
            <div>✅ Device Status: Active</div>
            <div class="last-update">🕒 Last Update: ${new Date(latest.Timestamp).toLocaleString()}</div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-icon">🌡️</div>
                <div class="metric-label">INLET TEMP</div>
                <div class="metric-value">${Tin.toFixed(1)}<span class="metric-unit">°C</span></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">🌡️</div>
                <div class="metric-label">OUTLET TEMP</div>
                <div class="metric-value">${Tout.toFixed(1)}<span class="metric-unit">°C</span></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">📊</div>
                <div class="metric-label">ΔT</div>
                <div class="metric-value">${deltaT}<span class="metric-unit">°C</span></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">⚡</div>
                <div class="metric-label">THERMAL POWER</div>
                <div class="metric-value">${Q.toFixed(1)}<span class="metric-unit">W</span></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">🔋</div>
                <div class="metric-label">ENERGY</div>
                <div class="metric-value">${(energy / 1000).toFixed(1)}<span class="metric-unit">kJ</span></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">🎯</div>
                <div class="metric-label">EFFICIENCY</div>
                <div class="metric-value">${efficiency.toFixed(1)}<span class="metric-unit">%</span></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon">☀️</div>
                <div class="metric-label">SOLAR POWER</div>
                <div class="metric-value">${solarPower.toFixed(1)}<span class="metric-unit">W</span></div>
            </div>
        </div>

        <div class="table-container">
            <h3>📜 Historical Data (Last 20 Entries)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Inlet (°C)</th>
                        <th>Outlet (°C)</th>
                        <th>Power (W)</th>
                        <th>Energy (kJ)</th>
                        <th>Efficiency (%)</th>
                    </tr>
                </thead>
                <tbody>
                    ${last20.map(entry => {
                        const rowTin = parseFloat(entry.Temperature_In || 0);
                        const rowTout = parseFloat(entry.Temperature_Out || 0);
                        const rowPwr = parseFloat(entry.Thermal_Power_W || 0);
                        const rowNrg = parseFloat(entry.Thermal_Energy_J || 0);
                        const rowEff = parseFloat(entry.Energy_Efficiency_Pct || 0);
                        
                        return `
                            <tr>
                                <td>${new Date(entry.Timestamp).toLocaleTimeString()}</td>
                                <td>${rowTin.toFixed(1)}</td>
                                <td>${rowTout.toFixed(1)}</td>
                                <td>${rowPwr.toFixed(1)}</td>
                                <td>${(rowNrg / 1000).toFixed(1)}</td>
                                <td>${rowEff.toFixed(1)}</td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;
}

// ===================== LOADER =====================
function loadData() {
    const old = document.getElementById("jsonpScript");
    if (old) old.remove();

    const script = document.createElement("script");
    script.id = "jsonpScript";
    script.src = SCRIPT_URL + "?callback=handleData&t=" + Date.now();

    script.onerror = () => {
        console.error("Script failed to load");
        document.getElementById('content').innerHTML = 
            '<div class="error">Failed to connect to Google Sheets. Check your URL.</div>';
    };

    document.body.appendChild(script);
}

// ===================== START =====================
loadData();
updateInterval = setInterval(loadData, 15000);

function logout() {
    if (updateInterval) clearInterval(updateInterval);
    localStorage.removeItem('selectedDeviceId');
    window.location.href = 'index.html';
}
</script>
    
</body>
</html>
