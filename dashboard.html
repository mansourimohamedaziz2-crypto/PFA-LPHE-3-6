<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Solar Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        h1 { color: #1a1a2e; display: flex; align-items: center; gap: 10px; }
        .device-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        button {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-icon { font-size: 48px; margin-bottom: 15px; }
        .metric-label { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .metric-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .metric-unit { font-size: 18px; color: #666; }
        .status-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .last-update { font-family: monospace; color: #f39c12; font-weight: bold; }
        .loading { text-align: center; padding: 50px; background: white; border-radius: 20px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { text-align: center; padding: 50px; background: white; border-radius: 20px; color: red; }
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            margin-top: 30px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>☀️</span> ESP32 Solar Thermal Monitor</h1>
            <div class="device-badge" id="deviceBadge">Loading...</div>
            <button onclick="logout()">🔒 Logout</button>
        </div>
        <div id="content"><div class="loading"><div class="spinner"></div><p>Loading data from Google Sheets...</p></div></div>
    </div>

    <script>
        // ===== YOUR WEB APP URL =====
        const YOUR_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLxaI7BUqJCUZKex5QsTN15QX9c8scNgSeNVBDPMiQNgIDwPesbOj20pmd0p8N6r_Dvg/exec";
        
        // TRY DIFFERENT PROXIES - UNCOMMENT THE ONE YOU WANT TO TRY:
        
        // Proxy 1: allorigins (may have rate limits)
        //const GOOGLE_SHEETS_API = "https://api.allorigins.win/raw?url=" + encodeURIComponent(YOUR_SCRIPT_URL);
        
        // Proxy 2: cors-anywhere (reliable)
         //const GOOGLE_SHEETS_API = "https://cors-anywhere.herokuapp.com/" + YOUR_SCRIPT_URL;
        
        // Proxy 3: codetabs (simple)
        //const GOOGLE_SHEETS_API = "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(YOUR_SCRIPT_URL);
        
        // Proxy 4: Direct (no proxy - may not work due to CORS)
         const GOOGLE_SHEETS_API = YOUR_SCRIPT_URL;
        
        let deviceId = localStorage.getItem('selectedDeviceId');
        let updateInterval;
        
        if (!deviceId) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('deviceBadge').innerHTML = 📡 ${deviceId};
        
        async function fetchData() {
            console.log("Fetching from:", GOOGLE_SHEETS_API);
            
            try {
                const response = await fetch(GOOGLE_SHEETS_API);
                console.log("Response status:", response.status);
                
                if (!response.ok) {
                    throw new Error(HTTP ${response.status});
                }
                
                let data = await response.json();
                console.log("Raw data:", data);
                
                // Handle different response formats from proxies
                if (data.contents) {
                    data = JSON.parse(data.contents);
                }
                
                if (!data || data.length === 0) {
                    document.getElementById('content').innerHTML = <div class="loading"><h3>Waiting for data...</h3><p>No data in Google Sheets yet.</p><button onclick="fetchData()">Refresh</button></div>;
                    return;
                }
                
                // Get the latest reading
                const latest = data[data.length - 1];
                console.log("Latest data:", latest);
                
                const last20 = data.slice(-20).reverse();
                
                const Tin = latest.Temperature_In || 0;
                const Tout = latest.Temperature_Out || 0;
                const deltaT = (Tout - Tin).toFixed(1);
                const Q = latest.Thermal_Power_W || 0;
                const energy = latest.Thermal_Energy_J || 0;
                const efficiency = latest.Energy_Efficiency_Pct || latest.Power_Efficiency_Pct || 0;
                const solarPower = latest.Solar_Power_W || 0;
                
                document.getElementById('content').innerHTML = `
                    <div class="status-card">
                        <div>✅ Device: ${deviceId}</div>
                        <div class="last-update">🕒 Last update: ${new Date(latest.Timestamp).toLocaleString()}</div>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-icon">🌡️</div><div class="metric-label">INLET TEMP (T1)</div><div class="metric-value">${Tin.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                        <div class="metric-card"><div class="metric-icon">🌡️</div><div class="metric-label">OUTLET TEMP (T2)</div><div class="metric-value">${Tout.toFixed(1)}<span class="metric-unit">°C</span></div></div>
                        <div class="metric-card"><div class="metric-icon">📊</div><div class="metric-label">DELTA T (ΔT)</div><div class="metric-value">${deltaT}<span class="metric-unit">°C</span></div></div>
                        <div class="metric-card"><div class="metric-icon">⚡</div><div class="metric-label">THERMAL POWER</div><div class="metric-value">${Q.toFixed(1)}<span class="metric-unit">W</span></div></div>
                        <div class="metric-card"><div class="metric-icon">🔋</div><div class="metric-label">ENERGY</div><div class="metric-value">${(energy / 1000).toFixed(1)}<span class="metric-unit">kJ</span></div></div>
                        <div class="metric-card"><div class="metric-icon">🎯</div><div class="metric-label">EFFICIENCY</div><div class="metric-value">${efficiency.toFixed(1)}<span class="metric-unit">%</span></div></div>
                        <div class="metric-card"><div class="metric-icon">☀️</div><div class="metric-label">SOLAR POWER</div><div class="metric-value">${solarPower.toFixed(1)}<span class="metric-unit">W</span></div></div>
                    </div>
                    <div class="table-container">
                        <h3>📜 Historical Data</h3>
                        <table><thead><tr><th>Time</th><th>T1</th><th>T2</th><th>Q</th><th>Energy</th><th>Eff</th></tr></thead>
                        <tbody>
                            ${last20.map(entry => `
                                <tr>
                                    <td>${new Date(entry.Timestamp).toLocaleTimeString()}</td>
                                    <td>${(entry.Temperature_In || 0).toFixed(1)}°C</td>
                                    <td>${(entry.Temperature_Out || 0).toFixed(1)}°C</td>
                                    <td>${(entry.Thermal_Power_W || 0).toFixed(1)}W</td>
                                    <td>${((entry.Thermal_Energy_J || 0) / 1000).toFixed(1)}kJ</td>
                                    <td>${(entry.Energy_Efficiency_Pct || 0).toFixed(1)}%</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    </div>
                `;
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('content').innerHTML = <div class="error"><h3>❌ Connection Error</h3><p>${error.message}</p><button onclick="fetchData()">Retry</button><p style="margin-top:10px;font-size:12px;">Try uncommenting a different proxy in the code</p></div>;
            }
        }
        
        function logout() {
            if (updateInterval) clearInterval(updateInterval);
            localStorage.removeItem('selectedDeviceId');
            window.location.href = 'index.html';
        }
        
        fetchData();
        updateInterval = setInterval(fetchData, 15000);
    </script>
</body>
</html>
